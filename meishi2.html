<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名刺OCR v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .zoom-slider {
            writing-mode: bt-lr; -webkit-appearance: slider-vertical; appearance: slider-vertical; width: 8px; height: 150px;
            background: rgba(255, 255, 255, 0.5); border-radius: 4px; outline: none;
        }
        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 24px; height: 24px; background: #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .cropper-view-box, .cropper-crop-box { outline: 2px solid #3b82f6 !important; }
        .cropper-point { width: 24px !important; height: 24px !important; background-color: rgba(59, 130, 246, 0.9) !important; border-radius: 50%; }
        .cropper-point::before { content: ' '; position: absolute; top: -20px; right: -20px; bottom: -20px; left: -20px; }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">🧾 名刺OCR v2</h1>
        <button id="nav-settings-btn" class="p-2 rounded hover:bg-blue-700 transition">⚙️ 設定</button>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div id="toast-msg" class="hidden bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 mb-4 rounded shadow-sm font-bold text-sm transition-opacity"></div>

        <section id="setup-area" class="hidden bg-white p-6 rounded-xl shadow-md mb-6">
            <h2 class="text-lg font-bold mb-2">APIキー設定</h2>
            <p class="text-sm text-gray-600 mb-4">Google Vision APIのキーを設定してください。</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." class="w-full border border-gray-300 p-3 rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="save-key-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-blue-700 transition">設定を保存</button>
            
            <hr class="my-6 border-gray-200">
            
            <h2 class="text-lg font-bold mb-2">データのバックアップ・復元</h2>
            <div class="space-y-3">
                <button id="backup-btn" class="w-full bg-blue-50 text-blue-700 border border-blue-200 font-bold py-3 px-4 rounded-lg shadow-sm hover:bg-blue-100 transition flex justify-center items-center gap-2">
                    <span>📥</span> JSONでバックアップ
                </button>
                <input type="file" id="restore-input" accept=".json" class="hidden">
                <button id="restore-btn" class="w-full bg-green-50 text-green-700 border border-green-200 font-bold py-3 px-4 rounded-lg shadow-sm hover:bg-green-100 transition flex justify-center items-center gap-2">
                    <span>📤</span> JSONから復元
                </button>
                <button id="zip-btn" class="w-full bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-indigo-600 transition flex justify-center items-center gap-2 mt-2">
                    <span>📦</span> 画像＋テキストをZIPで保存
                </button>
            </div>
            <button id="close-settings-btn" class="hidden w-full mt-6 bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg shadow hover:bg-gray-300 transition">閉じる</button>
        </section>

        <section id="main-area">
            <input type="file" id="image-input" accept="image/*" class="hidden">

            <div class="grid grid-cols-2 gap-4 mb-3">
                <button id="start-camera-btn" class="bg-indigo-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-indigo-600 flex flex-col items-center justify-center transition">
                    <span class="text-2xl mb-1">📷</span><span>カメラ起動</span>
                </button>
                <button id="file-btn" class="bg-teal-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-teal-600 flex flex-col items-center justify-center transition">
                    <span class="text-2xl mb-1">🖼️</span><span>画像を選ぶ</span>
                </button>
            </div>

            <div id="group-filters" class="flex gap-1 justify-between mb-6 bg-white p-2 rounded-xl shadow-sm border border-gray-200">
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-blue-600 text-white transition" data-group="all">全体</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="1">1</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="2">2</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="3">3</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="4">4</button>
                <button class="group-filter-btn flex-1 py-2 text-sm font-bold rounded bg-gray-100 text-gray-600 hover:bg-gray-200 transition" data-group="5">5</button>
            </div>

            <div id="camera-container" class="hidden bg-black rounded-xl overflow-hidden relative shadow-lg mb-6">
                <video id="video" autoplay playsinline class="w-full h-[60vh] object-cover"></video>
                <div id="zoom-area-camera" class="absolute top-4 right-4 flex flex-col items-center bg-black bg-opacity-40 p-2 rounded-full hidden">
                    <div id="zoom-label-camera" class="text-white text-xs font-bold mb-2">1.0x</div>
                    <input id="zoom-slider-camera" class="zoom-slider" type="range" min="1" max="5" step="0.1" value="1.0">
                </div>
                <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-4 px-4">
                    <button id="cancel-camera-btn" class="bg-gray-600 text-white px-4 py-3 rounded-full font-bold shadow-lg">✖</button>
                    <button id="capture-btn" class="bg-white text-blue-600 px-8 py-3 rounded-full font-bold shadow-lg text-lg border-4 border-gray-300 flex-grow">撮影する</button>
                </div>
                <canvas id="canvas" class="hidden"></canvas>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-md">
                <div class="flex justify-between items-center mb-3 border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-700 whitespace-nowrap">過去のデータ一覧</h2>
                </div>
                
                <div class="flex gap-2 mb-4">
                    <div class="relative flex-grow">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400">🔍</span>
                        <input type="text" id="history-search" placeholder="検索..." class="w-full border border-gray-300 pl-7 pr-2 py-2 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <select id="history-sort" class="border border-gray-300 rounded px-2 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="date_desc">新しい順</option>
                        <option value="date_asc">古い順</option>
                        <option value="name">ファイル名順</option>
                        <option value="company">会社名順</option>
                    </select>
                </div>
                
                <div id="history-list" class="space-y-4 max-h-[60vh] overflow-y-auto pr-1"></div>
            </div>
        </section>

        <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-white font-bold text-lg">処理中...</p>
        </div>
    </main>

    <div id="crop-modal" class="hidden fixed inset-0 bg-gray-900 z-[100]">
        <div class="absolute top-0 left-0 right-0 h-14 bg-gray-900 text-white flex justify-between items-center px-4 shadow z-10">
            <h3 class="font-bold">画像のトリミング</h3>
            <button id="cancel-crop-btn" class="text-gray-400 hover:text-white text-3xl font-bold leading-none px-2">&times;</button>
        </div>
        <div class="absolute top-14 bottom-[100px] left-0 right-0 bg-black overflow-hidden touch-none">
            <img id="crop-image" src="" alt="Crop" class="max-w-full block">
        </div>
        <div class="absolute bottom-0 left-0 right-0 h-[100px] bg-gray-900 flex items-center justify-center px-4 border-t border-gray-700 z-10 pb-4">
            <button id="apply-crop-btn" class="bg-blue-600 text-white px-6 py-4 rounded-lg font-bold hover:bg-blue-700 shadow-lg w-full text-lg cursor-pointer active:bg-blue-800 transition">
                ✂️ 切り抜いてOCR
            </button>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-[60] flex items-center justify-center p-2 sm:p-4">
        <div class="bg-white rounded-xl w-full max-w-lg flex flex-col max-h-[90vh] shadow-2xl overflow-hidden relative">
            <div class="p-4 flex justify-between items-center border-b shrink-0 bg-white">
                <h3 id="edit-modal-title" class="font-bold text-gray-800 text-lg">OCR結果の確認・保存</h3>
                <button id="close-edit-icon" class="text-gray-400 hover:text-gray-600 text-2xl leading-none px-2">&times;</button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-grow bg-gray-50">
                <p class="text-[11px] text-gray-500 mb-4 bg-yellow-50 p-2 rounded border border-yellow-200">
                    💡 <b>Tip:</b> 下のテキストエリア内の文字をなぞって選択（ハイライト）し、入力欄の右側のボタンを押すと自動入力できます。
                </p>

                <div class="mb-3">
                    <label class="text-xs font-bold text-gray-500 flex justify-between items-end mb-1">
                        <span>ファイル名</span>
                        <button type="button" onclick="insertSelectedText('file-name-input')" class="text-[10px] bg-blue-100 text-blue-700 hover:bg-blue-200 px-2 py-1 rounded font-bold shadow-sm transition">↑ 選択文字を入力</button>
                    </label>
                    <input type="text" id="file-name-input" class="w-full border border-gray-300 rounded p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                </div>
                
                <div class="mb-3">
                    <label class="text-xs font-bold text-gray-500 flex justify-between items-end mb-1">
                        <span>連絡先 / 会社名など</span>
                        <button type="button" onclick="insertSelectedText('company-input')" class="text-[10px] bg-blue-100 text-blue-700 hover:bg-blue-200 px-2 py-1 rounded font-bold shadow-sm transition">↑ 選択文字を入力</button>
                    </label>
                    <input type="text" id="company-input" placeholder="例: 〇〇株式会社" class="w-full border border-gray-300 rounded p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                </div>
                
                <label class="text-xs font-bold text-gray-500 mb-1 block">読み取りテキスト全文</label>
                <textarea id="edit-text" class="w-full h-48 border border-gray-300 rounded p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono bg-white"></textarea>
            </div>

            <div class="p-4 flex justify-end gap-3 border-t shrink-0 bg-white">
                <button id="cancel-edit-btn" class="bg-gray-200 text-gray-700 px-4 py-3 rounded-lg font-bold hover:bg-gray-300 transition">キャンセル</button>
                <button id="confirm-edit-btn" class="bg-blue-600 text-white px-4 py-3 rounded-lg font-bold hover:bg-blue-700 shadow transition flex-grow">確定して保存</button>
            </div>
        </div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-[110] flex items-center justify-center touch-none">
        <button id="close-image-modal" class="absolute top-4 right-4 text-white text-4xl font-bold z-50 p-2 leading-none">&times;</button>
        <img id="modal-image" src="" alt="拡大画像" class="max-w-full max-h-full origin-center object-contain">
        <p class="absolute bottom-6 text-white text-sm opacity-75 pointer-events-none bg-black bg-opacity-50 px-3 py-1 rounded-full">ピンチで拡大 / 1本指で移動</p>
    </div>

    <script>
        let GOOGLE_API_KEY = localStorage.getItem("GOOGLE_API_KEY") || "";
        let savedCompany = localStorage.getItem("companyName") || "";
        let lastPhotoBase64 = "";
        let cropper = null;
        let currentStream = null, currentTrack = null;
        let editingHistoryId = null; 
        
        let currentGroupFilter = 'all';

        const setupArea = document.getElementById('setup-area');
        const mainArea = document.getElementById('main-area');
        const toastMsg = document.getElementById('toast-msg');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraContainer = document.getElementById('camera-container');

        function beep(success = true) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = "sine"; osc.frequency.value = success ? 880 : 440;
                gain.gain.value = 0.1; osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 150);
            } catch (e) {}
        }

        function showToast(msg, isError = false) {
            toastMsg.textContent = msg;
            toastMsg.className = `bg-${isError ? 'red' : 'blue'}-100 border-l-4 border-${isError ? 'red' : 'blue'}-500 text-${isError ? 'red' : 'blue'}-700 p-4 mb-4 rounded shadow-sm font-bold text-sm transition-opacity z-50 relative`;
            toastMsg.classList.remove('hidden'); setTimeout(() => toastMsg.classList.add('hidden'), 4000);
        }

        function showLoading(text) { loadingText.textContent = text; loadingOverlay.classList.remove('hidden'); }
        function hideLoading() { loadingOverlay.classList.add('hidden'); }

        document.addEventListener('DOMContentLoaded', () => {
            if (!GOOGLE_API_KEY) { setupArea.classList.remove('hidden'); document.getElementById('close-settings-btn').classList.add('hidden'); } 
            else { document.getElementById('api-key-input').placeholder = "【＊＊＊＊＊＊】変更する場合のみ入力"; }
            renderHistory();
        });

        document.getElementById('nav-settings-btn').addEventListener('click', () => { setupArea.classList.remove('hidden'); document.getElementById('close-settings-btn').classList.remove('hidden'); });
        document.getElementById('close-settings-btn').addEventListener('click', () => setupArea.classList.add('hidden'));

        document.getElementById('save-key-btn').addEventListener('click', () => {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key && GOOGLE_API_KEY) { setupArea.classList.add('hidden'); return; }
            if (!key) return showToast("APIキーを入力してください", true);
            GOOGLE_API_KEY = key; localStorage.setItem("GOOGLE_API_KEY", key);
            document.getElementById('api-key-input').placeholder = "【＊＊＊＊＊＊】変更する場合のみ入力"; document.getElementById('api-key-input').value = "";
            showToast("APIキーを保存しました"); setupArea.classList.add('hidden');
        });

        // フィルターボタンイベント
        document.querySelectorAll('.group-filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.group-filter-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-gray-100', 'text-gray-600');
                });
                e.target.classList.add('bg-blue-600', 'text-white');
                e.target.classList.remove('bg-gray-100', 'text-gray-600');
                currentGroupFilter = e.target.dataset.group;
                renderHistory();
            });
        });

        const zoomAreaCamera = document.getElementById('zoom-area-camera'), zoomSliderCamera = document.getElementById('zoom-slider-camera'), zoomLabelCamera = document.getElementById('zoom-label-camera');
        document.getElementById('start-camera-btn').addEventListener('click', async () => {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } });
                video.srcObject = currentStream; cameraContainer.classList.remove('hidden');
                setTimeout(() => {
                    currentTrack = currentStream.getVideoTracks()[0]; const capabilities = currentTrack.getCapabilities();
                    if (capabilities.zoom) {
                        zoomAreaCamera.classList.remove('hidden');
                        zoomSliderCamera.min = capabilities.zoom.min; zoomSliderCamera.max = capabilities.zoom.max; zoomSliderCamera.step = capabilities.zoom.step || 0.1;
                        const initialZoom = Math.min(capabilities.zoom.max, Math.max(capabilities.zoom.min, 1.2));
                        zoomSliderCamera.value = initialZoom; zoomLabelCamera.textContent = initialZoom.toFixed(1) + "x";
                        currentTrack.applyConstraints({ advanced: [{ zoom: initialZoom }] });
                        zoomSliderCamera.oninput = () => { const z = Number(zoomSliderCamera.value); zoomLabelCamera.textContent = z.toFixed(1) + "x"; currentTrack.applyConstraints({ advanced: [{ zoom: z }] }); };
                        let lastDistance = null;
                        video.addEventListener("touchmove", e => {
                            if (e.touches.length === 2 && currentTrack) {
                                e.preventDefault();
                                const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                                const distance = Math.sqrt(dx * dx + dy * dy);
                                if (lastDistance) {
                                    let newZoom = Number(zoomSliderCamera.value) + (distance - lastDistance) * 0.005;
                                    newZoom = Math.max(capabilities.zoom.min, Math.min(capabilities.zoom.max, newZoom));
                                    zoomSliderCamera.value = newZoom; zoomLabelCamera.textContent = newZoom.toFixed(1) + "x";
                                    currentTrack.applyConstraints({ advanced: [{ zoom: newZoom }] });
                                }
                                lastDistance = distance;
                            }
                        }, {passive: false});
                        video.addEventListener("touchend", () => lastDistance = null);
                    }
                }, 500);
            } catch (e) { showToast("カメラが使えません: " + e.message, true); }
        });

        function stopCamera() { if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; currentTrack = null; } cameraContainer.classList.add('hidden'); zoomAreaCamera.classList.add('hidden'); }
        document.getElementById('cancel-camera-btn').addEventListener('click', stopCamera);
        document.getElementById('capture-btn').addEventListener('click', () => {
            if (video.readyState < 2 || video.videoWidth === 0) return showToast("カメラ準備中です", true);
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0); const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
            stopCamera(); openCropModal(dataUrl);
        });

        document.getElementById('file-btn').addEventListener('click', () => document.getElementById('image-input').click());
        document.getElementById('image-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = ev => openCropModal(ev.target.result); reader.readAsDataURL(file); e.target.value = ''; 
        });

        const cropModal = document.getElementById('crop-modal'), cropImage = document.getElementById('crop-image');
        function openCropModal(base64Image) {
            cropImage.src = base64Image; cropModal.classList.remove('hidden'); if (cropper) cropper.destroy();
            setTimeout(() => { cropper = new Cropper(cropImage, { viewMode: 1, autoCropArea: 0.6, background: false, dragMode: 'move', guides: true }); }, 50);
        }

        document.getElementById('cancel-crop-btn').addEventListener('click', () => { cropModal.classList.add('hidden'); if (cropper) { cropper.destroy(); cropper = null; } });
        document.getElementById('apply-crop-btn').addEventListener('click', async () => {
            if (!cropper) return;
            const croppedCanvas = cropper.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 }); lastPhotoBase64 = croppedCanvas.toDataURL("image/jpeg", 0.9);
            cropModal.classList.add('hidden'); cropper.destroy(); cropper = null;
            await executeOCR(lastPhotoBase64.split(",")[1]);
        });

        async function executeOCR(base64Data) {
            if (!GOOGLE_API_KEY) { showToast("APIキーを設定してください", true); setupArea.classList.remove('hidden'); return; }
            showLoading("クラウドで文字を解析中...");
            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ requests: [{ image: { content: base64Data }, features: [{ type: "DOCUMENT_TEXT_DETECTION" }], imageContext: { languageHints: ["ja"] } }] })
                });
                const data = await response.json(); if (!response.ok) throw new Error(data.error?.message || "通信エラー");
                if (!data.responses || !data.responses[0].fullTextAnnotation) { beep(false); throw new Error("文字が検出されませんでした"); }
                let text = autoFixText(data.responses[0].fullTextAnnotation.text || ""); beep(true);
                openEditModal(text, null);
            } catch (e) { beep(false); showToast("読み取り失敗: " + e.message, true); } finally { hideLoading(); }
        }

        function autoFixText(text) { return text.replace(/[O〇○]/g, "0").replace(/[Iｌ｜]/g, "1").replace(/問合せ/g, "問い合わせ").replace(/御/g, "ご").replace(/ +/g, " ").replace(/\n{2,}/g, "\n").trim(); }

        const editModal = document.getElementById('edit-modal'), fileNameInput = document.getElementById('file-name-input'), companyInput = document.getElementById('company-input'), editText = document.getElementById('edit-text'), editModalTitle = document.getElementById('edit-modal-title'), confirmEditBtn = document.getElementById('confirm-edit-btn');
        function generateDefaultFileName(company) { const now = new Date(); const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, "0"), d = String(now.getDate()).padStart(2, "0"); return `${y}${m}${d}_${company || "未設定"}`; }

        window.insertSelectedText = function(targetInputId) {
            const selectedText = editText.value.substring(editText.selectionStart, editText.selectionEnd).trim();
            if (selectedText) document.getElementById(targetInputId).value = selectedText;
            else alert("下のテキストエリア内で入れたい文字をなぞって選択(ハイライト)してからボタンを押してください。");
        };

        function openEditModal(text, historyId = null, existingFileName = "", existingCompany = "") {
            editingHistoryId = historyId; editText.value = text;
            if (historyId) { editModalTitle.textContent = "履歴データの修正"; fileNameInput.value = existingFileName; companyInput.value = existingCompany; confirmEditBtn.textContent = "変更を保存"; } 
            else { editModalTitle.textContent = "OCR結果の確認・保存"; companyInput.value = savedCompany; fileNameInput.value = generateDefaultFileName(savedCompany); confirmEditBtn.textContent = "確定して履歴に保存"; }
            editModal.classList.remove('hidden');
        }

        function closeEditModal() { editModal.classList.add('hidden'); }
        document.getElementById('cancel-edit-btn').addEventListener('click', closeEditModal); document.getElementById('close-edit-icon').addEventListener('click', closeEditModal);
        
        document.getElementById('confirm-edit-btn').addEventListener('click', () => {
            const fixedText = editText.value.trim(), fileName = fileNameInput.value.trim(), company = companyInput.value.trim();
            if (!fixedText) return showToast("テキストが空です", true); if (!fileName) return showToast("ファイル名を入力してください", true);
            if (!editingHistoryId) { savedCompany = company; localStorage.setItem("companyName", company); }
            if (editingHistoryId) updateHistoryEntry(editingHistoryId, fixedText, fileName, company);
            else saveHistoryEntry(lastPhotoBase64, fixedText, fileName, company);
            closeEditModal(); showToast(editingHistoryId ? "履歴を更新しました" : "履歴に保存しました");
        });

        function saveHistoryEntry(photo, text, fileName, company) {
            const history = JSON.parse(localStorage.getItem("receiptHistory_simple") || "[]");
            history.push({ id: new Date().toLocaleString("ja-JP"), photo: photo, rawText: text, fileName: fileName, company: company, group: currentGroupFilter === 'all' ? '1' : currentGroupFilter });
            localStorage.setItem("receiptHistory_simple", JSON.stringify(history)); renderHistory();
        }

        function updateHistoryEntry(id, text, fileName, company) {
            let history = JSON.parse(localStorage.getItem("receiptHistory_simple") || "[]"); const index = history.findIndex(h => h.id === id);
            if (index !== -1) { history[index].rawText = text; history[index].fileName = fileName; history[index].company = company; localStorage.setItem("receiptHistory_simple", JSON.stringify(history)); renderHistory(); }
        }

        window.deleteHistory = function(id) {
            if (confirm("この履歴を削除してもよろしいですか？")) {
                let history = JSON.parse(localStorage.getItem("receiptHistory_simple") || "[]");
                history = history.filter(h => h.id !== id); localStorage.setItem("receiptHistory_simple", JSON.stringify(history)); renderHistory();
            }
        };

        window.editFromHistory = function(id) {
            const history = JSON.parse(localStorage.getItem("receiptHistory_simple") || "[]"); const item = history.find(h => h.id === id);
            if (item) openEditModal(item.rawText, item.id, item.fileName, item.company);
        };

        window.changeGroup = function(id, newGroup) {
            let history = JSON.parse(localStorage.getItem("receiptHistory_simple") || "[]");
            const index = history.findIndex(h => h.id === id);
            if(index !== -1) { history[index].group = newGroup; localStorage.setItem("receiptHistory_simple", JSON.stringify(history)); renderHistory(); }
        };

        document.getElementById('history-search').addEventListener('input', renderHistory); document.getElementById('history-sort').addEventListener('change', renderHistory);

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem("receiptHistory_simple") || "[]");
            const keyword = document.getElementById('history-search').value.toLowerCase(), sortMode = document.getElementById('history-sort').value;
            const container = document.getElementById('history-list');

            // 絞り込み (検索 & グループ)
            history = history.filter(h => {
                const group = h.group || '1';
                const matchGroup = (currentGroupFilter === 'all' || group === currentGroupFilter);
                const matchKeyword = !keyword || h.fileName.toLowerCase().includes(keyword) || h.company.toLowerCase().includes(keyword) || h.rawText.toLowerCase().includes(keyword);
                return matchGroup && matchKeyword;
            });

            history = history.sort((a, b) => {
                if (sortMode === "date_desc") return new Date(b.id) - new Date(a.id); if (sortMode === "date_asc") return new Date(a.id) - new Date(b.id);
                if (sortMode === "name") return a.fileName.localeCompare(b.fileName); if (sortMode === "company") return a.company.localeCompare(b.company);
                return 0;
            });

            if (history.length === 0) { container.innerHTML = '<p class="text-gray-500 text-sm py-4 text-center">該当するデータがありません。</p>'; return; }

            container.innerHTML = history.map((h) => {
                const group = h.group || "1";
                return `
                <div class="border border-gray-200 rounded-lg p-3 shadow-sm bg-gray-50 mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="font-bold text-gray-800 text-sm leading-tight">${escapeHtml(h.fileName)}</p>
                            <p class="text-[11px] text-gray-500 mt-1">🏷️ ${escapeHtml(h.company)}</p>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-[10px] text-gray-400 mb-1">${h.id}</span>
                            <div class="flex items-center gap-1">
                                <select onchange="changeGroup('${h.id}', this.value)" class="text-xs border rounded p-1 bg-white text-gray-700 font-bold outline-none cursor-pointer">
                                    <option value="1" ${group === '1' ? 'selected' : ''}>G1</option>
                                    <option value="2" ${group === '2' ? 'selected' : ''}>G2</option>
                                    <option value="3" ${group === '3' ? 'selected' : ''}>G3</option>
                                    <option value="4" ${group === '4' ? 'selected' : ''}>G4</option>
                                    <option value="5" ${group === '5' ? 'selected' : ''}>G5</option>
                                </select>
                                <button onclick="deleteHistory('${h.id}')" class="text-xs text-red-500 hover:text-red-700 font-bold bg-white px-2 py-1 border rounded shadow-sm">削除</button>
                            </div>
                        </div>
                    </div>
                    ${h.photo ? `<div class="relative cursor-pointer group" onclick="openImageModal('${h.photo}')">
                        <img src="${h.photo}" class="w-full h-32 object-contain bg-white border rounded mb-2">
                        <div class="absolute inset-0 bg-black bg-opacity-10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition rounded mb-2">
                            <span class="text-white text-2xl drop-shadow">🔍</span>
                        </div>
                    </div>` : ''}
                    <button onclick="editFromHistory('${h.id}')" class="w-full text-sm text-blue-600 font-bold bg-white border border-blue-200 p-2 rounded shadow-sm hover:bg-blue-50 transition">
                        📝 読み取った内容を確認・編集
                    </button>
                </div>
                `;
            }).join('');
        }
        function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

        // =========================
        // 画像拡大表示 (ピンチ ＆ ドラッグ移動対応)
        // =========================
        const imageModal = document.getElementById('image-modal'), modalImage = document.getElementById('modal-image');
        let imgCurrentScale = 1, imgStartScale = 1, initialDistance = 0;
        let imgCurrentX = 0, imgCurrentY = 0, lastTouchX = 0, lastTouchY = 0, isDragging = false;

        window.openImageModal = function(imgSrc) {
            modalImage.src = imgSrc; imgCurrentScale = 1; imgCurrentX = 0; imgCurrentY = 0;
            updateModalTransform(); imageModal.classList.remove('hidden');
        };

        document.getElementById('close-image-modal').addEventListener('click', () => imageModal.classList.add('hidden'));

        function getDistance(touches) { const dx = touches[0].clientX - touches[1].clientX, dy = touches[0].clientY - touches[1].clientY; return Math.sqrt(dx * dx + dy * dy); }
        
        function updateModalTransform() { modalImage.style.transform = `translate(${imgCurrentX}px, ${imgCurrentY}px) scale(${imgCurrentScale})`; }

        modalImage.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) { 
                initialDistance = getDistance(e.touches); imgStartScale = imgCurrentScale; isDragging = false;
            } else if (e.touches.length === 1 && imgCurrentScale > 1) {
                isDragging = true; lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
            }
        }, { passive: false });
        
        modalImage.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); 
                imgCurrentScale = Math.min(Math.max(1, imgStartScale * (getDistance(e.touches) / initialDistance)), 5);
                if(imgCurrentScale <= 1) { imgCurrentX = 0; imgCurrentY = 0; }
                updateModalTransform();
            } else if (e.touches.length === 1 && isDragging && imgCurrentScale > 1) {
                e.preventDefault();
                imgCurrentX += e.touches[0].clientX - lastTouchX; imgCurrentY += e.touches[0].clientY - lastTouchY;
                lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
                updateModalTransform();
            }
        }, { passive: false });

        modalImage.addEventListener('touchend', () => { 
            isDragging = false; 
            if (imgCurrentScale <= 1) { imgCurrentX = 0; imgCurrentY = 0; updateModalTransform(); }
        });

        // バックアップ・復元・ZIP
        document.getElementById('backup-btn').addEventListener('click', () => {
            const history = localStorage.getItem("receiptHistory_simple") || "[]"; const blob = new Blob([history], { type: "application/json" });
            const url = URL.createObjectURL(blob); const a = document.createElement("a");
            a.href = url; a.download = `receipt_history_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); showToast("JSONファイルをダウンロードしました");
        });
        document.getElementById('restore-btn').addEventListener('click', () => document.getElementById('restore-input').click());
        document.getElementById('restore-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = ev => {
                try { const json = JSON.parse(ev.target.result); if (!Array.isArray(json)) throw new Error("無効な形式です");
                    localStorage.setItem("receiptHistory_simple", JSON.stringify(json)); renderHistory(); showToast("履歴を復元しました");
                } catch (err) { showToast("読み込み失敗: " + err.message, true); }
            }; reader.readAsText(file); e.target.value = '';
        });
        document.getElementById('zip-btn').addEventListener('click', async () => {
            const history = JSON.parse(localStorage.getItem("receiptHistory_simple") || "[]"); if (history.length === 0) return showToast("出力する履歴がありません", true);
            showLoading("ZIP作成中...");
            try {
                const zip = new JSZip(); const usedNames = new Set();
                history.forEach(h => {
                    let name = h.fileName || "noname"; let i = 1; while (usedNames.has(name)) { name = `${h.fileName}(${i})`; i++; } usedNames.add(name);
                    if (h.photo) zip.file(`${name}.jpg`, h.photo.split(",")[1], { base64: true }); zip.file(`${name}.txt`, h.rawText);
                });
                const blob = await zip.generateAsync({ type: "blob" }); const url = URL.createObjectURL(blob); const a = document.createElement("a");
                a.href = url; a.download = `receipts_ocr_${new Date().toISOString().slice(0,10)}.zip`; a.click(); URL.revokeObjectURL(url); showToast("ZIPファイルを作成しました");
            } catch (err) { showToast("ZIP作成失敗", true); } finally { hideLoading(); }
        });
    </script>
</body>
</html>
